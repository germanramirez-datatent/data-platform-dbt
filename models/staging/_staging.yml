version: 2
 
models:
  - name: stg_traffic_hourly
    description: >
      Hourly visitor traffic for shopping center EUR_MAD_001.
      1:1 view over the curated traffic table — column selection and renaming only.
      Source: simulation-api → Argo → S3 raw → Glue job → S3 curated.
    columns:
      - name: center_id
        description: Shopping center identifier (e.g. EUR_MAD_001).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['EUR_MAD_001']
 
      - name: event_timestamp
        description: Hourly record timestamp in UTC. Natural PK of this model.
        tests:
          - not_null
          - unique
 
      - name: event_date
        description: Event date. Matches the S3 analytical partition.
        tests:
          - not_null
 
      - name: visitors_count
        description: Number of visitors recorded in that hour. Always >= 0.
        tests:
          - not_null
 
      - name: day_of_week
        description: Day of the week in lowercase English (monday, tuesday, ...).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday']
 
      - name: is_holiday
        description: True if the day is a national public holiday in Spain per Nager.Date.
        tests:
          - not_null
 
      - name: weather_condition
        description: Simplified weather condition string generated by the simulation-api.
        tests:
          - not_null
 
      - name: temperature_c
        description: Temperature in degrees Celsius at the time of the record.
        tests:
          - not_null
 
  - name: stg_weather_hourly
    description: >
      Hourly meteorological observations from Open-Meteo for the Madrid location
      (fixed lat/lon of center EUR_MAD_001). 1:1 view over curated weather.
      Adds a human-readable WMO code label and adverse condition flags.
    columns:
      - name: event_timestamp
        description: Observation timestamp in UTC. Natural PK of this model.
        tests:
          - not_null
          - unique
 
      - name: event_date
        description: Observation date.
        tests:
          - not_null
 
      - name: temperature_c
        description: Temperature in degrees Celsius.
        tests:
          - not_null
 
      - name: precipitation_mm
        description: Accumulated precipitation in millimeters for that hour.
        tests:
          - not_null
 
      - name: wind_speed_kmh
        description: Wind speed in km/h.
        tests:
          - not_null
 
      - name: weather_code
        description: WMO weather condition code. See weather_condition_label for classification.
        tests:
          - not_null
 
      - name: latitude
        description: Latitude of the weather station (fixed for this center).
 
      - name: longitude
        description: Longitude of the weather station (fixed for this center).
 
      - name: timezone
        description: Timezone of the observation (Europe/Madrid).
 
      - name: weather_condition_label
        description: >
          Human-readable classification of the WMO code.
          Possible values: clear, partly_cloudy, fog, rain, snow, showers, thunderstorm, unknown.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['clear', 'partly_cloudy', 'fog', 'rain', 'snow', 'showers', 'thunderstorm', 'unknown']
 
      - name: is_rainy
        description: True if precipitation_mm >= 1.0. Significant rainfall threshold.
        tests:
          - not_null
 
      - name: is_extreme_heat
        description: True if temperature_c >= 35.0. Extreme heat threshold.
        tests:
          - not_null
 
  - name: stg_holidays
    description: >
      Spanish national public holidays from Nager.Date. Daily granularity.
      One record per holiday — not one row per calendar day, only for actual holidays.
      1:1 view over curated holidays.
    columns:
      - name: event_date
        description: Holiday date. Natural PK of this model.
        tests:
          - not_null
          - unique
 
      - name: country_code
        description: ISO country code. Always ES in this lab.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['ES']
 
      - name: local_name
        description: Holiday name in Spanish.
        tests:
          - not_null
 
      - name: holiday_name_en
        description: Holiday name in English (renamed from name).
        tests:
          - not_null
 
      - name: is_fixed
        description: True if the holiday always falls on the same calendar date.
 
      - name: is_global
        description: True if the holiday applies nationally (vs. regional).
 
      - name: launch_year
        description: Year from which this holiday has been observed. Nullable for historical holidays.
 
      - name: holiday_types
        description: "Array of holiday type tags: Public, Bank, Optional, etc."
 
      - name: ingest_date
        description: Date on which Argo ingested this record from Nager.Date.
 
  - name: stg_flights
    description: >
      Aircraft snapshots over Madrid airspace from OpenSky Network.
      Each row is one aircraft observed at a point in time (snapshot, not continuous tracking).
      Unix timestamps are converted to readable timestamps. 1:1 view over curated flights.
    columns:
      - name: icao24
        description: Unique ICAO24 transponder identifier for the aircraft.
        tests:
          - not_null
 
      - name: callsign
        description: Flight callsign. Trimmed — the source includes trailing whitespace.
 
      - name: origin_country
        description: Country of origin of the aircraft per transponder registration.
 
      - name: event_date
        description: Snapshot date. Matches the S3 analytical partition.
        tests:
          - not_null
 
      - name: snapshot_timestamp
        description: Argo snapshot timestamp (converted from unix epoch via snapshot_time).
        tests:
          - not_null
 
      - name: position_timestamp
        description: Last known position timestamp (converted from time_position unix epoch).
 
      - name: last_contact_timestamp
        description: Last transponder contact timestamp (converted from last_contact unix epoch).
 
      - name: latitude
        description: Current latitude of the aircraft.
 
      - name: longitude
        description: Current longitude of the aircraft.
 
      - name: baro_altitude
        description: Barometric altitude in meters. May be null if on_ground is true.
 
      - name: geo_altitude
        description: Geometric (GPS) altitude in meters.
 
      - name: on_ground
        description: True if the aircraft is on the ground.
        tests:
          - not_null
 
      - name: velocity
        description: Horizontal velocity in m/s.
 
      - name: true_track
        description: True track angle in degrees (0-360, north = 0).
 
      - name: vertical_rate
        description: Vertical rate in m/s. Negative = descending.
 
      - name: squawk
        description: 4-digit transponder squawk code.
 
      - name: spi
        description: Special Purpose Indicator — emergency or special identification signal.
 
      - name: position_source
        description: "Position data source: 0=ADS-B, 1=ASTERIX, 2=MLAT, 3=FLARM."