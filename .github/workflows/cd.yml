name: CD
 
on:
  push:
    branches: [main, dev]
    paths:
      - 'models/**'
      - 'macros/**'
      - 'dbt_project.yml'
      - 'profiles.yml'
      - 'Dockerfile'
 
permissions:
  id-token: write
  contents: read
 
env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: 811430801421.dkr.ecr.eu-west-1.amazonaws.com
  ECR_REPOSITORY: data-platform/dbt-runner
 
jobs:
  dbt-test:
    name: dbt test
    runs-on: ubuntu-latest
    environment: dev
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dbt
        run: pip install dbt-core==1.11.8 dbt-athena-community==1.10.0
 
      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          data_platform:
            target: dev
            outputs:
              dev:
                type: athena
                region_name: eu-west-1
                s3_staging_dir: s3://data-platform-dev-athena-results-811430801421/query-results/
                s3_data_dir: s3://data-platform-dev-curated-811430801421/
                s3_data_naming: schema_table_unique
                database: awsdatacatalog
                schema: data_platform_dev_curated
                work_group: data-platform-dev-analytics
                threads: 4
                poll_interval: 1.0
          EOF
 
      - name: dbt run
        run: dbt run --profiles-dir ~/.dbt
 
      - name: dbt test
        run: dbt test --profiles-dir ~/.dbt
 
  push-dbt-runner:
    name: Build and push dbt-runner
    runs-on: ubuntu-latest
    environment: dev
    needs: dbt-test
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Build and push dbt-runner
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max